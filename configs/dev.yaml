# Lightweight local training (non-official; for wiring checks).

meta:
  config_id: "development"

training:
  epochs: 3
  visualize_every: 1
  lr: 0.0003
  grad_clip_value: 1.0
  lambda_size: 0.0001

model:
  topology_loss:
    metric_type: "anisotropic"
    distance_backend: "mahalanobis"

data:
  train_size: 80
  val_size: 20
  test_size: 50
  batch_size: 4
  max_points: 100
  num_outliers: 20
  num_workers: 2
  pin_memory: true

device: "auto"

outputs:
  base_dir: "outputs/dev"
