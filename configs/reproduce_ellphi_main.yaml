# Post-fix ellphi multiseed main run (same hyperparams as reproduce.yaml; lighter viz I/O).
# Pilot calibration uses reproduce.yaml; this config is for the 5-seed main phase.

meta:
  config_id: "reproduce_ellphi_main"

model:
  point_dim: 2
  feature_dim: 128
  ellipse_param_dim: 5
  threshold: 0.5
  topology_loss:
    metric_type: "anisotropic"
    distance_backend: "mahalanobis"
    ellphi_differentiable: true

loss:
  w_class: 1.0
  w_topo: 0.1
  w_aniso: 0.01099204345474479
  w_size: 0.0055785823086202556
  pos_weight: 1.0
  aniso_mode: "linear"

training:
  lr: 0.0004897466143769238
  epochs: 50
  grad_clip_value: 1.0
  visualize_every: 10
  warmup_epochs: 0
  use_amp: true

data:
  max_points: 200
  num_outliers: 20
  seed: 42
  test_size: 1000
  num_workers: 4
  batch_size: 64
  pin_memory: true

performance:
  cudnn_benchmark: true
  enable_tf32: true
  matmul_precision: high

outputs:
  base_dir: "outputs"
