# Issue #59 verification: reproduce_1week_tuned + mahalanobis + early MCC abort + diagnostics.
# Mahalanobis only; aborts if MCC stays ~0 after probe_epochs (default 8 — size reg needs epochs).

meta:
  config_id: "issue59_verify_mahalanobis"

model:
  point_dim: 2
  feature_dim: 128
  threshold: 0.5
  topology_loss:
    distance_backend: "mahalanobis"
    ellphi_differentiable: true

loss:
  w_class: 1.0
  w_topo: 0.2
  w_aniso: 0.01099204345474479
  w_size: 0.0005578582308620256
  pos_weight: 1.0
  aniso_mode: "linear"

training:
  lr: 0.0004897466143769238
  epochs: 12
  grad_clip_value: 1.0
  visualize_every: 1
  warmup_epochs: 0
  use_amp: true
  early_abort:
    enabled: false

data:
  max_points: 100
  num_outliers: 20
  seed: 42
  test_size: 1000
  num_workers: 4
  batch_size: 16
  pin_memory: true

performance:
  cudnn_benchmark: true
  enable_tf32: true
  matmul_precision: high

outputs:
  base_dir: "outputs"
