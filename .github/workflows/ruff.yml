# F-1 / BLG-004: run static analysis on every PR and on pushes to protected branches.
# PR1 scope: ruff only. pytest and repro-smoke are added when tda_ml/ and tests/ land (later PRs).
# Add this workflow as a required status check in branch protection to block merges on failure.
name: Ruff

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (recursive submodules for pytorch-topological path dependency)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # pyproject path dependency; shallow clones without the submodule leave this empty.
      - name: Ensure pytorch-topological (uv path dependency)
        run: |
          set -euo pipefail
          if [[ ! -f pytorch-topological/pyproject.toml ]]; then
            git clone --depth 1 https://github.com/aidos-lab/pytorch-topological.git pytorch-topological
          fi

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies (all groups, incl. dev / ruff)
        run: uv sync --all-groups --frozen

      - name: Ruff check (repo root; F-1 canonical command)
        run: uv run ruff check .
