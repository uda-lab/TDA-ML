# F-1 / BLG-004: PR（および main への push）で静的解析ゲートを必ず実行する。
# マージをブロックするにはリポジトリの Branch protection で本 workflow を必須チェックに追加する。
name: Ruff

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout（pytorch-topological は path 依存のためサブモジュールを再帰取得）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies（dev 含む: ruff）
        run: uv sync --all-groups --frozen

      - name: Ruff check（リポジトリ直下・F-1 正規コマンド）
        run: uv run ruff check .
